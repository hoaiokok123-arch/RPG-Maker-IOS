name: RPGPlayerClone

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.RPGPlayerClone
    PRODUCT_NAME: RPGPlayerClone
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: RPGPlayerClone/Info.plist
    CODE_SIGN_ENTITLEMENTS: RPGPlayerClone/RPGPlayerClone.entitlements
    SWIFT_OBJC_BRIDGING_HEADER: RPGPlayerClone-Bridging-Header.h
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  RPGPlayerClone:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RPGPlayerClone
        excludes:
          - Assets.xcassets
          - Resources
          - Info.plist
          - RPGPlayerClone.entitlements
    resources:
      - path: RPGPlayerClone/Assets.xcassets
      - path: RPGPlayerClone/Resources
