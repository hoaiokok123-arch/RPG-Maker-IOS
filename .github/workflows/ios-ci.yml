name: Build TrollStore IPA

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .ci-reports/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-trollstore-ipa:
    name: Build TrollStore IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install build tools
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

          if ! command -v ldid >/dev/null 2>&1; then
            brew install ldid
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install CocoaPods dependencies
        run: bundle exec pod install

      - name: Build iPhoneOS app
        run: |
          mkdir -p build
          LOG_PATH="build/xcodebuild-iphoneos.log"
          set -o pipefail

          xcodebuild \
            -workspace RPGPlayerClone.xcworkspace \
            -scheme RPGPlayerClone \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DeviceDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_PREVIEWS=NO \
            ENABLE_DEBUG_DYLIB=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee "${LOG_PATH}" | bundle exec xcpretty

          BUILD_STATUS=${PIPESTATUS[0]}
          if [[ "${BUILD_STATUS}" -ne 0 ]]; then
            echo "::group::Raw xcodebuild tail"
            tail -n 250 "${LOG_PATH}" || true
            echo "::endgroup::"
            exit "${BUILD_STATUS}"
          fi

      - name: Package TrollStore IPA
        run: |
          set -euo pipefail

          APP_PATH="build/DeviceDerivedData/Build/Products/Debug-iphoneos/RPGPlayerClone.app"
          ARTIFACT_DIR="build/Artifacts"
          PAYLOAD_DIR="${ARTIFACT_DIR}/Payload"
          STAGED_APP="${PAYLOAD_DIR}/RPGPlayerClone.app"
          IPA_PATH="${ARTIFACT_DIR}/RPGPlayerClone-trollstore.ipa"
          REPORT_PATH="${ARTIFACT_DIR}/RPGPlayerClone-trollstore-report.txt"
          ENTITLEMENTS_PATH="${GITHUB_WORKSPACE}/RPGPlayerClone/RPGPlayerClone.entitlements"
          BINARIES_LIST="${ARTIFACT_DIR}/mach-o-files.txt"

          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Expected device app bundle not found at ${APP_PATH}" >&2
            find build/DeviceDerivedData/Build/Products -maxdepth 3 -print >&2 || true
            exit 1
          fi

          mkdir -p "${PAYLOAD_DIR}"
          rm -rf "${STAGED_APP}" "${IPA_PATH}" "${REPORT_PATH}" "${BINARIES_LIST}"
          rsync -aL "${APP_PATH}/" "${STAGED_APP}/"

          APP_INFO="${STAGED_APP}/Info.plist"
          APP_EXECUTABLE="$(
            /usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "${APP_INFO}" 2>/dev/null \
            || defaults read "${APP_INFO%.*}" CFBundleExecutable 2>/dev/null \
            || true
          )"

          if [[ -z "${APP_EXECUTABLE}" || ! -f "${STAGED_APP}/${APP_EXECUTABLE}" ]]; then
            echo "Could not locate app executable inside ${STAGED_APP}" >&2
            find "${STAGED_APP}" -maxdepth 2 -print >&2 || true
            exit 1
          fi

          APP_BINARY="${STAGED_APP}/${APP_EXECUTABLE}"
          PRIMARY_RUNTIME_BINARY="${APP_BINARY}"
          DEBUG_DYLIB="${STAGED_APP}/${APP_EXECUTABLE}.debug.dylib"
          if [[ -f "${DEBUG_DYLIB}" ]]; then
            PRIMARY_RUNTIME_BINARY="${DEBUG_DYLIB}"
          fi

          {
            echo "App path: ${APP_PATH}"
            echo "Staged app: ${STAGED_APP}"
            echo "Executable: ${APP_BINARY}"
            echo "Primary runtime binary: ${PRIMARY_RUNTIME_BINARY}"
            echo
            echo "Pre-sign bundle size:"
            du -sh "${STAGED_APP}"
            echo
            echo "Top-level staged app contents:"
            find "${STAGED_APP}" -maxdepth 2 -mindepth 1 | sort
          } | tee "${REPORT_PATH}"

          while IFS= read -r -d '' candidate; do
            if file "${candidate}" | grep -q 'Mach-O'; then
              printf '%s\n' "${candidate}" >> "${BINARIES_LIST}"
            fi
          done < <(find "${STAGED_APP}" -type f -print0)

          if [[ ! -s "${BINARIES_LIST}" ]]; then
            echo "No Mach-O binaries found inside staged app bundle." >&2
            find "${STAGED_APP}" -maxdepth 3 -print >&2 || true
            exit 1
          fi

          {
            echo
            echo "Mach-O binaries:"
            cat "${BINARIES_LIST}"
          } | tee -a "${REPORT_PATH}"

          ldid -S"${ENTITLEMENTS_PATH}" "${APP_BINARY}"
          while IFS= read -r binary; do
            if [[ "${binary}" == "${APP_BINARY}" ]]; then
              continue
            fi
            ldid -S "${binary}"
          done < "${BINARIES_LIST}"

          (
            cd "${ARTIFACT_DIR}"
            ditto -c -k --sequesterRsrc --keepParent Payload "RPGPlayerClone-trollstore.ipa"
          )

          IPA_SIZE="$(stat -f%z "${IPA_PATH}")"
          APP_BINARY_SIZE="$(stat -f%z "${APP_BINARY}")"
          PRIMARY_RUNTIME_BINARY_SIZE="$(stat -f%z "${PRIMARY_RUNTIME_BINARY}")"

          {
            echo
            echo "Executable size: ${APP_BINARY_SIZE} bytes"
            echo "Primary runtime binary size: ${PRIMARY_RUNTIME_BINARY_SIZE} bytes"
            echo "IPA size: ${IPA_SIZE} bytes"
            echo
            echo "IPA contents:"
            unzip -l "${IPA_PATH}"
          } | tee -a "${REPORT_PATH}"

          if [[ "${PRIMARY_RUNTIME_BINARY_SIZE}" -lt 100000 ]]; then
            echo "Primary runtime binary is unexpectedly small: ${PRIMARY_RUNTIME_BINARY_SIZE} bytes" >&2
            exit 1
          fi

          if [[ "${IPA_SIZE}" -lt 50000 ]]; then
            echo "TrollStore IPA is unexpectedly small: ${IPA_SIZE} bytes" >&2
            exit 1
          fi

      - name: Upload TrollStore IPA
        uses: actions/upload-artifact@v7
        with:
          name: RPGPlayerClone-trollstore-ipa
          path: build/Artifacts/RPGPlayerClone-trollstore.ipa
          if-no-files-found: error
          compression-level: 0

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: RPGPlayerClone-build-logs
          path: |
            build/DeviceDerivedData/Logs
            build/DeviceDerivedData/Build/Intermediates.noindex/XCBuildData
            build/xcodebuild-iphoneos.log
            build/Artifacts
          if-no-files-found: warn

      - name: Write success summary
        if: success()
        run: |
          mkdir -p .ci-reports
          cat > .ci-reports/latest-build-summary.txt <<EOF
          status: success
          workflow: Build TrollStore IPA
          run_id: ${{ github.run_id }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          commit: ${{ github.sha }}
          branch: ${{ github.ref_name }}
          updated_at_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          artifact: RPGPlayerClone-trollstore-ipa
          EOF

      - name: Write failure summary
        if: failure()
        run: |
          mkdir -p .ci-reports
          LOG_PATH="build/xcodebuild-iphoneos.log"
          REPORT_PATH=".ci-reports/latest-build-summary.txt"

          {
            echo "status: failure"
            echo "workflow: Build TrollStore IPA"
            echo "run_id: ${{ github.run_id }}"
            echo "run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "commit: ${{ github.sha }}"
            echo "branch: ${{ github.ref_name }}"
            echo "updated_at_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "error_matches:"
            if [[ -f "${LOG_PATH}" ]]; then
              grep -n -E "error:|❌|\\*\\* BUILD FAILED \\*\\*" "${LOG_PATH}" | tail -n 80 || true
            else
              echo "log file not found: ${LOG_PATH}"
            fi
            echo
            echo "trollstore_report_tail:"
            if [[ -f "build/Artifacts/RPGPlayerClone-trollstore-report.txt" ]]; then
              tail -n 220 "build/Artifacts/RPGPlayerClone-trollstore-report.txt" || true
            else
              echo "report file not found: build/Artifacts/RPGPlayerClone-trollstore-report.txt"
            fi
            echo
            echo "raw_tail:"
            if [[ -f "${LOG_PATH}" ]]; then
              tail -n 220 "${LOG_PATH}" || true
            else
              echo "log file not found: ${LOG_PATH}"
            fi
          } > "${REPORT_PATH}"

      - name: Commit CI summary
        if: always()
        run: |
          SUMMARY_PATH=".ci-reports/latest-build-summary.txt"
          if [[ -z "$(git status --porcelain -- "${SUMMARY_PATH}")" ]]; then
            echo "No CI summary changes to commit."
            exit 0
          fi

          TMP_SUMMARY="$(mktemp)"
          cp "${SUMMARY_PATH}" "${TMP_SUMMARY}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git checkout -B ci-summary "origin/${GITHUB_REF_NAME}"
            mkdir -p .ci-reports
            cp "${TMP_SUMMARY}" "${SUMMARY_PATH}"

            if [[ -z "$(git status --porcelain -- "${SUMMARY_PATH}")" ]]; then
              echo "No CI summary changes to commit after syncing branch."
              exit 0
            fi

            git add "${SUMMARY_PATH}"
            git commit -m "chore: update CI status summary [skip ci]"
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              exit 0
            fi

            echo "Retrying CI summary push (${attempt}/3)..."
            git reset --hard "origin/${GITHUB_REF_NAME}"
            sleep 2
          done

          echo "Unable to push CI summary after retries."
          exit 0
