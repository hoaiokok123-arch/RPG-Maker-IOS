name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-simulator:
    name: Build iOS Simulator App
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install CocoaPods dependencies
        run: bundle exec pod install

      - name: Build for iOS Simulator
        run: |
          mkdir -p build
          xcodebuild \
            -workspace RPGPlayerClone.xcworkspace \
            -scheme RPGPlayerClone \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build | bundle exec xcpretty

      - name: Prepare simulator app artifact
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Debug-iphonesimulator/RPGPlayerClone.app"
          ARTIFACT_DIR="build/Artifacts"
          STAGED_APP="${ARTIFACT_DIR}/RPGPlayerClone.app"
          ARTIFACT_ZIP="${ARTIFACT_DIR}/RPGPlayerClone-simulator-app.zip"
          SIZE_REPORT="${ARTIFACT_DIR}/RPGPlayerClone-simulator-app-size.txt"

          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Expected app bundle not found at ${APP_PATH}" >&2
            echo "Available build products:" >&2
            find build/DerivedData/Build/Products -maxdepth 3 -print >&2 || true
            exit 1
          fi

          mkdir -p "${ARTIFACT_DIR}"
          rm -rf "${STAGED_APP}" "${ARTIFACT_ZIP}"

          if [[ -L "${APP_PATH}" ]]; then
            echo "App bundle is a symlink: $(readlink "${APP_PATH}")" | tee "${SIZE_REPORT}"
          else
            : > "${SIZE_REPORT}"
          fi

          rsync -aL "${APP_PATH}/" "${STAGED_APP}/"

          {
            echo "Original app bundle path: ${APP_PATH}"
            echo "Staged app bundle path: ${STAGED_APP}"
            echo
            du -sh "${APP_PATH}"
            du -sh "${STAGED_APP}"
            echo
            echo "Top-level bundle contents:"
            find "${STAGED_APP}" -maxdepth 2 -mindepth 1 | sort
          } | tee "${SIZE_REPORT}"

          ditto -c -k --keepParent "${STAGED_APP}" "${ARTIFACT_ZIP}"
          ls -lh "${ARTIFACT_ZIP}" | tee -a "${SIZE_REPORT}"

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v7
        with:
          name: RPGPlayerClone-simulator-app
          path: |
            build/Artifacts/RPGPlayerClone-simulator-app.zip
            build/Artifacts/RPGPlayerClone-simulator-app-size.txt
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: RPGPlayerClone-build-logs
          path: |
            build/DerivedData/Logs
            build/DerivedData/Build/Intermediates.noindex/XCBuildData
          if-no-files-found: warn
