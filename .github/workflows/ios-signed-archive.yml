name: Build IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build Unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install CocoaPods dependencies
        run: bundle exec pod install

      - name: Show available schemes
        run: xcodebuild -list -workspace RPGPlayerClone.xcworkspace

      - name: Build iPhoneOS app
        run: |
          set -euo pipefail
          mkdir -p build
          LOG_PATH="build/xcodebuild.log"

          xcodebuild \
            -workspace RPGPlayerClone.xcworkspace \
            -scheme RPGPlayerClone \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_PREVIEWS=NO \
            ENABLE_DEBUG_DYLIB=NO \
            ONLY_ACTIVE_ARCH=NO \
            build | tee "${LOG_PATH}" | bundle exec xcpretty

      - name: Package IPA
        run: |
          set -euo pipefail

          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/RPGPlayerClone.app"
          ARTIFACT_DIR="build/Artifacts"
          PAYLOAD_DIR="${ARTIFACT_DIR}/Payload"
          IPA_PATH="${ARTIFACT_DIR}/RPGPlayerClone-unsigned.ipa"

          if [[ ! -d "${APP_PATH}" ]]; then
            echo "App bundle not found at ${APP_PATH}" >&2
            find build/DerivedData/Build/Products -maxdepth 3 -print >&2 || true
            exit 1
          fi

          rm -rf "${ARTIFACT_DIR}"
          mkdir -p "${PAYLOAD_DIR}"
          ditto "${APP_PATH}" "${PAYLOAD_DIR}/RPGPlayerClone.app"

          (
            cd "${ARTIFACT_DIR}"
            ditto -c -k --sequesterRsrc --keepParent Payload "RPGPlayerClone-unsigned.ipa"
          )

          ls -lh "${IPA_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: RPGPlayerClone-unsigned-ipa
          path: build/Artifacts/RPGPlayerClone-unsigned.ipa
          if-no-files-found: error
          compression-level: 0

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: RPGPlayerClone-build-logs
          path: |
            build/xcodebuild.log
            build/DerivedData/Logs
          if-no-files-found: warn
