name: Sync Xcode Artifacts

on:
  push:
    branches:
      - main
      - master
    paths:
      - project.yml
      - Podfile
      - Gemfile
      - .gitignore
      - .github/workflows/sync-xcodeproj.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-xcode-artifacts:
    name: Generate and Commit Xcode/CocoaPods Files
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install CocoaPods dependencies
        run: bundle exec pod install

      - name: Commit generated artifacts
        run: |
          if [[ -z "$(git status --porcelain -- RPGPlayerClone.xcodeproj RPGPlayerClone.xcworkspace Podfile.lock Gemfile.lock Pods)" ]]; then
            echo "No generated artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A RPGPlayerClone.xcodeproj RPGPlayerClone.xcworkspace Podfile.lock Gemfile.lock Pods
          git commit -m "chore: sync Xcode artifacts [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
