name: Sync Xcode Project

on:
  push:
    branches:
      - main
      - master
    paths:
      - project.yml
      - .github/workflows/sync-xcodeproj.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-xcodeproj:
    name: Generate and Commit RPGPlayerClone.xcodeproj
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Commit generated Xcode project
        run: |
          if [[ -z "$(git status --porcelain -- RPGPlayerClone.xcodeproj)" ]]; then
            echo "No Xcode project changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add RPGPlayerClone.xcodeproj
          git commit -m "chore: regenerate Xcode project [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
